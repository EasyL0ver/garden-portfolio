
name: deploy web app prod

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'prod'
        type: choice
        options:
          - prod
          - staging

env:
  JPEG_QUALITY: '85'


jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false
      - name: Get commit message and add to HTML files
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%B)
          for file in *.html; do
            if [ -f "$file" ]; then
              TEMP_FILE=$(mktemp)
              echo "<!-- Deploy: $COMMIT_MSG - $(date) -->" > "$TEMP_FILE"
              cat "$file" >> "$TEMP_FILE"
              mv "$TEMP_FILE" "$file"
            fi
          done
      # - name: auto minify the files
      #   uses: nizarmah/auto-minify@v3
      #   with:
      #     overwrite: true
      # - name: Compress Images
      #   id: calibre
      #   uses: calibreapp/image-actions@main
      #   with:
      #       # compress only - do not create a pull request
      #       compressOnly: true
      #       jpegQuality: ${{ env.JPEG_QUALITY }}
      - name: Build blog
        run: |
          pip install markdown -q
          python blog-src/build.py
      - name: Deploy to prod
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod')
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SALMON_MEADOW_0288D0A03 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "/"
      - name: Deploy to staging
        if: github.event_name == 'workflow_dispatch' && inputs.environment == 'staging'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "/"

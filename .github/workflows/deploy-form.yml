name: deploy email handler

on:
  push:
    branches:
      - master
    paths:
      - 'form/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Azure Function
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: |
          dotnet publish form/form.csproj --configuration Release --output ./form/publish
          cd form/publish && zip -r ../../form-publish.zip .

      - name: Login to Azure
        uses: Azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        run: |
          az functionapp deployment source config-zip \
            --resource-group mama-strona \
            --name form-functions \
            --src form-publish.zip

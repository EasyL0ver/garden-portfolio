    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}

        function loadGtag() {
            var s = document.createElement('script');
            s.src = 'https://www.googletagmanager.com/gtag/js?id=G-DBM0FEFTDV';
            s.async = true;
            document.head.appendChild(s);
            gtag('js', new Date());
            gtag('config', 'G-DBM0FEFTDV');

        }
    </script>
    <link rel="icon" type="image/x-icon" href="/resources/img/logo/drawingpainted.svg">

    <link rel="preload" href="/fonts/quicksand-400.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="stylesheet" href="/styles/bundle.css">
    <style>
        .nav-cta-btn {
            background: rgb(17, 77, 7) !important;
            color: white !important;
            border: none !important;
            padding: 5px 14px !important;
            font-weight: 600;
            font-size: 0.85rem;
            margin-left: 4px;
            letter-spacing: 0.2px;
        }
        .nav-cta-btn:hover {
            background: rgb(10, 50, 4) !important;
            color: white !important;
        }
        .background-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: rgb(237, 250, 238) !important;
        }
        .blog-content {
            margin-top: var(--navbar-height);
            flex: 1;
        }
        .blog-container {
            background: white;
            padding: 2rem 2.5rem;
        }
        @media (max-width: 600px) {
            .blog-container { padding: 1.25rem 1rem; }
        }
        .blog-hero {
            position: relative;
            text-align: center;
            padding: 4rem 2rem;
            margin: -2rem -2.5rem 2.5rem;
            background-color: #2c3a27;
            border-radius: 4px 4px 0 0;
            overflow: hidden;
        }
        .blog-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url('/resources/img/floral-contour-rotated-green-filter.jpg');
            background-size: cover;
            background-position: center;
            opacity: 0.12;
        }
        .blog-hero h1, .blog-hero p { position: relative; z-index: 1; }
        .blog-hero h1 { font-size: clamp(1.3rem, 5.5vw, 3rem); font-weight: 300; letter-spacing: 0.04em; margin: 0 0 0.6rem; color: #fff; text-transform: lowercase; word-break: break-word; }
        @media (max-width: 400px) { .blog-hero h1 { font-size: 1.15rem; letter-spacing: 0; } }
        .blog-hero p { color: rgba(255,255,255,0.75); margin: 0; font-style: italic; font-size: 1.05rem; }
        @media (max-width: 600px) {
            .blog-hero { margin: -1.25rem -1rem 2rem; padding: 3rem 1rem; }
            .blog-hero h1 { font-size: 2.2rem; }
        }
        .post-list { display: flex; flex-direction: column; gap: 2rem; }
        .post-card { border-left: 3px solid var(--separator-color); padding-left: 1.25rem; }
        .post-meta { font-size: 0.8rem; color: var(--bs-secondary); margin-bottom: 0.3rem; }
        .post-card-title { margin: 0 0 0.5rem; font-size: 1.25rem; font-weight: 600; }
        .post-card-title a { text-decoration: none; color: var(--bs-primary); }
        .post-card-title a:hover { text-decoration: underline; }
        .post-card-summary { margin: 0 0 0.75rem; font-size: 0.95rem; }
        .post-read-more { font-size: 0.9rem; font-weight: 600; text-decoration: none; }
        .post-read-more:hover { text-decoration: underline; }
        .breadcrumb-blog { margin-bottom: 1.5rem; font-size: 0.9rem; }
        .breadcrumb-blog a { text-decoration: none; font-weight: 600; }
        .post-header { border-bottom: 1px solid var(--separator-color); padding-bottom: 1rem; margin-bottom: 2rem; }
        .post-title { font-size: 2rem; font-weight: 700; margin: 0.25rem 0 0; line-height: 1.3; }
        .post-content { line-height: 1.8; font-size: 1.05rem; }
        .post-content h2 { font-size: 1.4rem; font-weight: 600; margin-top: 2rem; border-bottom: 1px solid var(--separator-color); padding-bottom: 0.3rem; }
        .post-content h3 { font-size: 1.15rem; font-weight: 600; margin-top: 1.5rem; }
        .post-content img { max-width: 480px; width: 100%; height: auto; display: block; margin: 1.5rem auto; border-radius: 4px; }
        .post-content ul, .post-content ol { padding-left: 1.5rem; }
        .post-content li { margin-bottom: 0.4rem; }
        .post-footer-nav { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid var(--separator-color); }
        .post-back { text-decoration: none; font-weight: 600; font-size: 0.9rem; }
    </style>
</head>
